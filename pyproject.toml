[tool.ruff]
target-version = "py311"
line-length = 120
exclude = ["migrations", ".venv", "venv", "__pycache__"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line length — контролируется line-length
    "B008",   # function calls in default arguments (DRF паттерн)
    "N806",   # variable in function should be lowercase (QuerySet переменные)
    "SIM108", # ternary operator (читаемость важнее)
    "UP007",  # use X | Y instead of Optional (совместимость)
]

[tool.ruff.lint.isort]
known-first-party = ["products", "orders", "users", "utils", "wishlist", "shipping", "promotions", "parser", "sellout"]
force-sort-within-sections = true
